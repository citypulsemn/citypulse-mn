name: Verify Upcoming Events

# Re-checks the next 7 days of events against their sources (roadmap 4.5), so a
# show cancelled mid-week doesn't sit on the calendar until Monday's research
# run. Thursday 16:00 UTC (~11am Central) — before the weekend, after the digest.
on:
  schedule:
    - cron: "0 16 * * 4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (check + report, change nothing)"
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify upcoming events
        run: npm run verify ${{ github.event.inputs.dry_run == 'true' && '-- --dry-run' || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
